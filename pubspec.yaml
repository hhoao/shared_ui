name: shared_ui
description: Shared Flutter UI infrastructure for huji and teampilot.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.3
  window_manager: ^0.5.1
  toggle_switch: ^2.3.0
  flutter_animate: 4.5.2
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/google_fonts/
